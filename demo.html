<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InTune Plumbing — HaLian Prime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --cream: #FFF8F3;
      --cream-deep: #F8EFE5;
      --white: #FFFFFF;
      --orange: #FF6B35;
      --orange-bright: #FF7B45;
      --orange-soft: #FFF1EA;
      --text: #1A1A1A;
      --text-2: #5A5A5A;
      --text-3: #9A9A9A;
      --border: #E8E4DE;
      --shadow-sm: 0 1px 2px rgba(40,30,20,0.04), 0 2px 8px rgba(40,30,20,0.04);
      --shadow-md: 0 2px 4px rgba(40,30,20,0.04), 0 8px 24px rgba(40,30,20,0.06);
      --shadow-lg: 0 4px 12px rgba(40,30,20,0.06), 0 24px 48px rgba(40,30,20,0.08);
      --shadow-orange: 0 4px 14px rgba(255,107,53,0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::selection { background: var(--orange); color: var(--white); }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--cream);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .chat-container {
      width: 420px;
      max-width: 100%;
      height: 640px;
      max-height: 95vh;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ─── */
    .chat-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-mark {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--orange);
      box-shadow: var(--shadow-orange);
      display: grid;
      place-items: center;
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .header-info h3 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--text);
      line-height: 1.2;
    }
    .header-info p {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }
    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 8px rgba(255,107,53,0.6);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }
    #env-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-3);
      background: var(--cream-deep);
      padding: 1px 5px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    /* ─── Messages ─── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--cream);
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .message {
      max-width: 82%;
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
      animation: fadeIn 0.25s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--orange);
      color: var(--white);
      border-bottom-right-radius: 4px;
      box-shadow: var(--shadow-orange);
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--white);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    /* Markdown inside assistant messages */
    .message.assistant p { margin-bottom: 6px; }
    .message.assistant p:last-child { margin-bottom: 0; }
    .message.assistant strong { font-weight: 600; color: var(--text); }
    .message.assistant ul, .message.assistant ol {
      margin: 4px 0;
      padding-left: 20px;
    }
    .message.assistant li { margin-bottom: 3px; }
    .message.assistant code {
      background: var(--orange-soft);
      color: var(--orange);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }
    .message.assistant h1, .message.assistant h2,
    .message.assistant h3, .message.assistant h4 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 6px 0 3px 0;
      color: var(--text);
    }

    .message.typing {
      align-self: flex-start;
      background: var(--white);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 14px 16px;
    }
    .typing-dots {
      display: flex;
      gap: 4px;
    }
    .typing-dots span {
      width: 7px;
      height: 7px;
      background: var(--orange);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
      opacity: 0.8;
    }
    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .message .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-3);
      margin-top: 6px;
      letter-spacing: 0.02em;
    }

    /* ─── Input ─── */
    .chat-input {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: var(--white);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .chat-input input {
      flex: 1;
      padding: 11px 16px;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }
    .chat-input input:focus {
      border-color: var(--orange);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(255,107,53,0.10);
    }
    .chat-input input::placeholder { color: var(--text-3); }
    .chat-input input:disabled {
      background: var(--cream-deep);
      color: var(--text-3);
    }

    .chat-input button {
      width: 40px;
      height: 40px;
      background: var(--orange);
      color: var(--white);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-orange);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .chat-input button:hover:not(:disabled) {
      background: var(--orange-bright);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(255,107,53,0.35);
    }
    .chat-input button:disabled {
      background: var(--text-3);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .chat-input button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Powered by footer */
    .powered-by {
      text-align: center;
      padding: 8px 0;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-3);
      letter-spacing: 0.05em;
      background: var(--white);
      border-top: 1px solid var(--border);
    }
    .powered-by a {
      color: var(--orange);
      text-decoration: none;
      font-weight: 500;
    }
    .powered-by a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="logo-mark">H</div>
      <div class="header-info">
        <h3>InTune Plumbing</h3>
        <p>
          <span class="live-dot"></span>
          Online 24/7 · Bilingual
          <span id="env-badge"></span>
        </p>
      </div>
    </div>
    <div class="chat-messages" id="messages">
      <div class="message assistant">
        Hi! Welcome to InTune Plumbing. ¿En qué te puedo ayudar hoy? Puedo agendar citas, dar estimados o atender una emergencia.
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="input" placeholder="Type your message..." autofocus />
      <button id="send" aria-label="Send message">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
    <div class="powered-by">
      Powered by <a href="https://halianprime.com" target="_blank" rel="noopener">HaLian Prime</a>
    </div>
  </div>

  <script>
    // ── Environment switch ──
    // Default: production. Override with ?env=local to test against local dev server.
    const ENVS = {
      prod:  { url: 'https://halian-bots-production.up.railway.app/api/chat', key: 'hb_dev_intune_4f7c3237298b0fcd13703df2de9629f1' },
      local: { url: 'http://localhost:3000/api/chat',                          key: 'hb_dev_intune_141822dcfe85a74a720937417c020f59' },
    };
    const ENV_NAME = new URLSearchParams(window.location.search).get('env') === 'local' ? 'local' : 'prod';
    const { url: API_URL, key: API_KEY } = ENVS[ENV_NAME];

    const envBadge = document.getElementById('env-badge');
    if (envBadge) envBadge.textContent = ENV_NAME === 'local' ? 'LOCAL' : '';

    let conversationId = null;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    marked.setOptions({ breaks: true, gfm: true });

    function addMessage(content, role) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (role === 'user') {
        div.textContent = content;
      } else if (role === 'assistant') {
        div.innerHTML = marked.parse(content);
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function addTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'message typing';
      div.id = 'typing';
      div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function setLoading(on) {
      inputEl.disabled = on;
      sendBtn.disabled = on;
    }

    async function typeMessage(element, html, speed = 12) {
      return new Promise((resolve) => {
        const temp = document.createElement('div');
        temp.innerHTML = html;
        const fullText = temp.textContent || '';
        element.innerHTML = '';
        let i = 0;
        function type() {
          if (i < fullText.length) {
            const chunk = Math.min(3, fullText.length - i);
            i += chunk;
            element.innerHTML = marked.parse(fullText.slice(0, i));
            messagesEl.scrollTop = messagesEl.scrollHeight;
            setTimeout(type, speed);
          } else {
            element.innerHTML = html;
            resolve();
          }
        }
        type();
      });
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      addMessage(text, 'user');

      const typingEl = addTypingIndicator();
      setLoading(true);

      try {
        const body = { message: text };
        if (conversationId) body.conversationId = conversationId;

        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-API-Key': API_KEY,
          },
          body: JSON.stringify(body),
        });

        const data = await res.json();
        typingEl.remove();

        if (res.ok) {
          conversationId = data.conversationId;

          const msgEl = document.createElement('div');
          msgEl.className = 'message assistant';
          messagesEl.appendChild(msgEl);

          const fullHtml = marked.parse(data.response);
          await typeMessage(msgEl, fullHtml);

          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = `${data.model} · $${data.costUsd.toFixed(4)}`;
          msgEl.appendChild(meta);
        } else {
          addMessage(`Error: ${typeof data.error === 'string' ? data.error : 'request failed'}`, 'assistant');
        }
      } catch (err) {
        typingEl.remove();
        addMessage('Connection error. Is the server running?', 'assistant');
      }

      setLoading(false);
      inputEl.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
